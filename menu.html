<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-background">

    <header>
        <div class="nav-container">
            <button class="hamburger" id="hamburger-button">
                <img src="images/hamburger-menu.webp" alt = "Menu">
            </button>
            <ul class="navigation" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <h1 class="hero">Our Menu</h1>

    <div id="cart-modal" class="modal">
        <div class="modal-content">

            <h3 id="modal-item-name">Food Name</h3>
            <label for="modal-notes">Notes for kitchen:</label>
            <textarea id="modal-notes" placeholder="Any special instructions?"></textarea>

            <div class="quantity-add">
                <div>
                    <button id="decrease-quantity">-</button>
                    <input type="number" id="modal-quantity" value="1" min="1">
                    <button id="increase-quantity">+</button>
                </div>
                <button id="add-to-cart-btn">Add to Cart ($<span id="modal-total-price">0.00</span>)</button>
            </div>
        </div>
    </div>

    <div class="menu-layout">    

        <div class="menu">
            <div class="menu-card">
                <h3>Cheese Pizza</h3>
                <img class="food_menu" src="images/Cheese_pizza.jpg" alt="Cheese Pizza">
                <p>$10</p>
            </div>
            <div class="menu-card">
                <h3>Pepperoni Pizza</h3>
                <img class="food_menu" src="images/Pepperoni_pizza.jpg" alt="Pepperoni Pizza">
                <p>$15</p>
            </div>
            <div class="menu-card">
                <h3>Cheeseburger</h3>
                <img class="food_menu" src="images/cheeseburger.jpg" alt="Cheeseburger">
                <p>$12</p>
            </div>
            <div class="menu-card">
                <h3>Beef Burger</h3>
                <img class="food_menu" src="images/beef_burger.webp" alt="Beef Burger">
                <p>$12</p>
            </div>
            <div class="menu-card">
                <h3>Caesar Salad</h3>
                <img class="food_menu" src="images/grilled_caeaser_salad.jpg" alt="Caeaser Salad">
                <p>$8</p>
            </div>
            <div class="menu-card">
                <h3>Chicken Salad</h3>
                <img class="food_menu" src="images/chicken_salad.jpg" alt="Chicken Salad">
                <p>$12</p>
            </div>
        </div>

        <div class="cart-sidebar">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <p id="cart-total">Total: $0.00</p>
            <button id="clear-cart">Clear Cart</button>
        </div>

    </div> 

    <script src="menu.js"></script>
    <script src="slider.js"></script>

</body>
</html>
